<svg viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg" id="betty-svg">
  <defs>
    <style>
      #betty-tail-group {
        animation: bettyWag 1s ease-in-out infinite;
      }
      .betty-eye-l, .betty-eye-r {
        transform-box: fill-box;
        transform-origin: center;
        animation: bettyBlink 5s ease-in-out infinite;
      }
      .betty-eye-r { animation-delay: 0.05s; }
      #betty-body-group {
        transform-box: fill-box;
        transform-origin: center;
        animation: bettyBreathe 3.5s ease-in-out infinite;
      }
      @keyframes bettyWag {
        0%, 100% { transform: translate(148px, 188px) rotate(-5deg); }
        35%       { transform: translate(148px, 188px) rotate(22deg); }
        70%       { transform: translate(148px, 188px) rotate(-18deg); }
      }
      @keyframes bettyBlink {
        0%, 88%, 100% { transform: scaleY(1); }
        92%           { transform: scaleY(0.08); }
      }
      @keyframes bettyBreathe {
        0%, 100% { transform: scaleY(1) scaleX(1); }
        50%      { transform: scaleY(1.025) scaleX(0.99); }
      }
    </style>
    <radialGradient id="wg" cx="40%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="70%"  stop-color="#f5f2ee"/>
      <stop offset="100%" stop-color="#e6e0d8"/>
    </radialGradient>
    <radialGradient id="wg2" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ede8e1"/>
    </radialGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#b8ad9e" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- TAIL (animated, rotates around base at origin) -->
  <g id="betty-tail-group">
    <!-- shapes placed so (0,0) is the rotation anchor -->
    <circle cx="14"  cy="-5"  r="13" fill="url(#wg2)"/>
    <circle cx="22"  cy="-17" r="11" fill="url(#wg2)"/>
    <circle cx="17"  cy="-29" r="9"  fill="url(#wg2)"/>
    <circle cx="9"   cy="-39" r="7"  fill="url(#wg2)"/>
  </g>

  <!-- BODY (breathing animation) -->
  <g id="betty-body-group">
    <ellipse cx="100" cy="188" rx="55" ry="53" fill="url(#wg)" filter="url(#softShadow)"/>
    <circle cx="68"  cy="167" r="21" fill="url(#wg2)" opacity="0.9"/>
    <circle cx="132" cy="167" r="21" fill="url(#wg2)" opacity="0.9"/>
    <circle cx="76"  cy="200" r="18" fill="url(#wg2)" opacity="0.85"/>
    <circle cx="124" cy="200" r="18" fill="url(#wg2)" opacity="0.85"/>
    <circle cx="100" cy="210" r="17" fill="url(#wg2)" opacity="0.8"/>
    <circle cx="53"  cy="186" r="16" fill="url(#wg2)" opacity="0.78"/>
    <circle cx="147" cy="186" r="16" fill="url(#wg2)" opacity="0.78"/>
  </g>

  <!-- PAWS -->
  <ellipse cx="78"  cy="238" rx="18" ry="10" fill="url(#wg2)"/>
  <ellipse cx="122" cy="238" rx="18" ry="10" fill="url(#wg2)"/>
  <path d="M69 237 Q78 242 87 237"  stroke="#c8bfb0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M113 237 Q122 242 131 237" stroke="#c8bfb0" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- NECK -->
  <ellipse cx="100" cy="144" rx="24" ry="17" fill="url(#wg)"/>

  <!-- HEAD -->
  <circle cx="100" cy="100" r="47" fill="url(#wg)" filter="url(#softShadow)"/>

  <!-- Head fluffy texture -->
  <circle cx="62"  cy="84"  r="23" fill="url(#wg2)" opacity="0.82"/>
  <circle cx="138" cy="84"  r="23" fill="url(#wg2)" opacity="0.82"/>
  <circle cx="75"  cy="60"  r="19" fill="url(#wg2)" opacity="0.78"/>
  <circle cx="125" cy="60"  r="19" fill="url(#wg2)" opacity="0.78"/>
  <circle cx="100" cy="54"  r="17" fill="url(#wg2)" opacity="0.72"/>
  <circle cx="68"  cy="116" r="16" fill="url(#wg2)" opacity="0.68"/>
  <circle cx="132" cy="116" r="16" fill="url(#wg2)" opacity="0.68"/>

  <!-- EARS -->
  <ellipse cx="55"  cy="114" rx="19" ry="30" fill="url(#wg)" stroke="#ddd8cf" stroke-width="0.6"/>
  <ellipse cx="145" cy="114" rx="19" ry="30" fill="url(#wg)" stroke="#ddd8cf" stroke-width="0.6"/>
  <circle cx="47"  cy="131" r="15" fill="url(#wg2)" opacity="0.85"/>
  <circle cx="153" cy="131" r="15" fill="url(#wg2)" opacity="0.85"/>

  <!-- EYES -->
  <g class="betty-eye-l">
    <circle cx="86"  cy="97" r="10"  fill="#1c1008"/>
    <circle cx="89"  cy="93" r="4"   fill="white" opacity="0.95"/>
    <circle cx="84"  cy="96" r="2"   fill="white" opacity="0.5"/>
  </g>
  <g class="betty-eye-r">
    <circle cx="114" cy="97" r="10"  fill="#1c1008"/>
    <circle cx="117" cy="93" r="4"   fill="white" opacity="0.95"/>
    <circle cx="112" cy="96" r="2"   fill="white" opacity="0.5"/>
  </g>

  <!-- NOSE -->
  <ellipse cx="100" cy="112" rx="7.5" ry="5.5" fill="#1c1008"/>
  <ellipse cx="98.5" cy="110.5" rx="2.5" ry="1.5" fill="white" opacity="0.35"/>

  <!-- MOUTH -->
  <path d="M93 118 Q100 126 107 118" stroke="#1c1008" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- PINK BOW -->
  <g transform="translate(100,52)">
    <ellipse cx="-9" cy="-3" rx="7.5" ry="5" fill="#d4738a" transform="rotate(-28 -9 -3)"/>
    <ellipse cx="9"  cy="-3" rx="7.5" ry="5" fill="#d4738a" transform="rotate(28 9 -3)"/>
    <circle cx="0" cy="0" r="5.5" fill="#e8849a"/>
    <circle cx="0" cy="0" r="2.5" fill="#d4738a"/>
  </g>
</svg>
