<svg viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg" id="teddy-svg">
  <defs>
    <style>
      #teddy-tail-group {
        animation: teddyWag 0.9s ease-in-out infinite;
      }
      .teddy-eye-l, .teddy-eye-r {
        transform-box: fill-box;
        transform-origin: center;
        animation: teddyBlink 4.5s ease-in-out infinite;
      }
      .teddy-eye-r { animation-delay: 0.06s; }
      #teddy-body-group {
        transform-box: fill-box;
        transform-origin: center;
        animation: teddyBreathe 3.2s ease-in-out infinite;
      }
      @keyframes teddyWag {
        0%, 100% { transform: translate(148px, 188px) rotate(-6deg); }
        35%       { transform: translate(148px, 188px) rotate(22deg); }
        70%       { transform: translate(148px, 188px) rotate(-16deg); }
      }
      @keyframes teddyBlink {
        0%, 88%, 100% { transform: scaleY(1); }
        92%           { transform: scaleY(0.08); }
      }
      @keyframes teddyBreathe {
        0%, 100% { transform: scaleY(1) scaleX(1); }
        50%      { transform: scaleY(1.025) scaleX(0.99); }
      }
    </style>
    <radialGradient id="tg1" cx="40%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#d4956a"/>
      <stop offset="70%"  stop-color="#a06840"/>
      <stop offset="100%" stop-color="#7a4a20"/>
    </radialGradient>
    <radialGradient id="tg2" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#c8834a"/>
      <stop offset="100%" stop-color="#7a4f2a"/>
    </radialGradient>
    <filter id="ts" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#6b3e1a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- TAIL (animated around group origin 0,0) -->
  <g id="teddy-tail-group">
    <circle cx="13"  cy="-5"  r="13" fill="url(#tg2)"/>
    <circle cx="21"  cy="-16" r="11" fill="url(#tg2)"/>
    <circle cx="15"  cy="-27" r="9"  fill="url(#tg2)"/>
    <circle cx="8"   cy="-36" r="7"  fill="url(#tg2)"/>
  </g>

  <!-- BODY (poodle curls + breathing) -->
  <g id="teddy-body-group">
    <ellipse cx="100" cy="188" rx="54" ry="52" fill="url(#tg1)" filter="url(#ts)"/>
    <circle cx="70"  cy="168" r="21" fill="url(#tg2)" opacity="0.9"/>
    <circle cx="130" cy="168" r="21" fill="url(#tg2)" opacity="0.9"/>
    <circle cx="78"  cy="200" r="18" fill="url(#tg2)" opacity="0.85"/>
    <circle cx="122" cy="200" r="18" fill="url(#tg2)" opacity="0.85"/>
    <circle cx="100" cy="210" r="17" fill="url(#tg2)" opacity="0.8"/>
    <circle cx="53"  cy="186" r="16" fill="url(#tg2)" opacity="0.78"/>
    <circle cx="147" cy="186" r="16" fill="url(#tg2)" opacity="0.78"/>
  </g>

  <!-- PAWS -->
  <ellipse cx="78"  cy="238" rx="18" ry="10" fill="url(#tg2)"/>
  <ellipse cx="122" cy="238" rx="18" ry="10" fill="url(#tg2)"/>
  <path d="M69 237 Q78 242 87 237"  stroke="#7a4a20" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M113 237 Q122 242 131 237" stroke="#7a4a20" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- NECK -->
  <ellipse cx="100" cy="144" rx="23" ry="16" fill="url(#tg1)"/>

  <!-- HEAD -->
  <circle cx="100" cy="100" r="46" fill="url(#tg1)" filter="url(#ts)"/>

  <!-- Head poodle curl texture -->
  <circle cx="63"  cy="84"  r="22" fill="url(#tg2)" opacity="0.82"/>
  <circle cx="137" cy="84"  r="22" fill="url(#tg2)" opacity="0.82"/>
  <circle cx="76"  cy="61"  r="18" fill="url(#tg2)" opacity="0.78"/>
  <circle cx="124" cy="61"  r="18" fill="url(#tg2)" opacity="0.78"/>
  <circle cx="100" cy="55"  r="16" fill="url(#tg2)" opacity="0.72"/>
  <circle cx="68"  cy="116" r="15" fill="url(#tg2)" opacity="0.68"/>
  <circle cx="132" cy="116" r="15" fill="url(#tg2)" opacity="0.68"/>

  <!-- EARS (long floppy poodle ears) -->
  <ellipse cx="54"  cy="108" rx="20" ry="34" fill="url(#tg1)" stroke="#7a4a20" stroke-width="0.5"/>
  <ellipse cx="146" cy="108" rx="20" ry="34" fill="url(#tg1)" stroke="#7a4a20" stroke-width="0.5"/>
  <!-- Ear curly fluff -->
  <circle cx="46"  cy="120" r="16" fill="url(#tg2)" opacity="0.88"/>
  <circle cx="154" cy="120" r="16" fill="url(#tg2)" opacity="0.88"/>
  <circle cx="50"  cy="135" r="14" fill="url(#tg2)" opacity="0.82"/>
  <circle cx="150" cy="135" r="14" fill="url(#tg2)" opacity="0.82"/>
  <circle cx="56"  cy="95"  r="14" fill="url(#tg2)" opacity="0.8"/>
  <circle cx="144" cy="95"  r="14" fill="url(#tg2)" opacity="0.8"/>

  <!-- EYES -->
  <g class="teddy-eye-l">
    <circle cx="86"  cy="97" r="10" fill="#2a1208"/>
    <circle cx="89"  cy="93" r="4"  fill="white" opacity="0.95"/>
    <circle cx="84"  cy="96" r="2"  fill="white" opacity="0.5"/>
  </g>
  <g class="teddy-eye-r">
    <circle cx="114" cy="97" r="10" fill="#2a1208"/>
    <circle cx="117" cy="93" r="4"  fill="white" opacity="0.95"/>
    <circle cx="112" cy="96" r="2"  fill="white" opacity="0.5"/>
  </g>

  <!-- NOSE -->
  <ellipse cx="100" cy="112" rx="7.5" ry="5.5" fill="#2a1208"/>
  <ellipse cx="98.5" cy="110.5" rx="2.5" ry="1.5" fill="white" opacity="0.3"/>

  <!-- MOUTH -->
  <path d="M93 118 Q100 126 107 118" stroke="#2a1208" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
